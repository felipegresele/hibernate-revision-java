spring.application.name=Loja-de-pedidos

spring.datasource.url=jdbc:postgresql://localhost:5432/estudos
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.key=${JWT_KEY}
jwt.expiration=300000
jwt.refresh.expiration=3600000

springdoc.api-docs.path:/api/api-docs
springdoc.api-docs.swagger-ui:/swagger/index.html